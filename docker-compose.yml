---
# Aegis-SSH-MCP - Docker Compose
#
# Usage:
#   docker compose pull
#   docker compose run --rm -i aegis-ssh-mcp
#
# By default this service pulls the published image from GitHub Container
# Registry (GHCR). Set AEGIS_IMAGE_TAG to pin a specific published version.

version: "3.9"

services:
  aegis-ssh-mcp:
    image: ghcr.io/sparksbenjamin/aegis-ssh-mcp:${AEGIS_IMAGE_TAG:-latest}
    pull_policy: always
    container_name: aegis-ssh-mcp

    # MCP over stdio - stdin/stdout must be kept open.
    stdin_open: true
    tty: false

    environment:
      AEGIS_CONFIGS_DIR: /configs
      AEGIS_RULES_DIR: /rules

    volumes:
      # Host definitions - writable so fsnotify picks up live changes.
      - type: bind
        source: ./configs
        target: /configs

      # Security profiles - writable so rule updates don't require restart.
      - type: bind
        source: ./rules
        target: /rules

      # SSH private keys - read-only; ensure strict permissions on the host.
      - type: bind
        source: ./keys
        target: /keys
        read_only: true

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    read_only: true
    tmpfs:
      - /tmp:size=10m,mode=1777

    restart: on-failure:5

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
